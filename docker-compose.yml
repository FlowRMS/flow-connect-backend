version: "3.8"

services:
  flow-connect-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-flowconnect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flowconnect}
      POSTGRES_DB: ${DB_NAME:-flowconnect}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
